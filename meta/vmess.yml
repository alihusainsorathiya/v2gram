proxy-groups:
  - name: MANUAL
    type: select
    proxies:
      - "@vpnfail_v2ray| AHS -🇺🇸|84.83"
      - "@v2rayvmess| AHS -🇺🇸|2.84"
      - "@v2ray1_ng| AHS -🇺🇸|85.44"
      - "@v2ray_confings2| AHS -🇺🇸|187.85"
      - LOAD-BALANCE
      - BEST-PING
      - FALLBACK
      - DIRECT
  - name: LOAD-BALANCE
    type: load-balance
    strategy: consistent-hashing
    url: http://hi.bonds.id/ping
    interval: 300
    proxies:
      - "@vpnfail_v2ray| AHS -🇺🇸|84.83"
      - "@v2rayvmess| AHS -🇺🇸|2.84"
      - "@v2ray1_ng| AHS -🇺🇸|85.44"
      - "@v2ray_confings2| AHS -🇺🇸|187.85"
  - name: BEST-PING
    type: url-test
    url: http://hi.bonds.id/ping
    interval: 300
    tolerance: 50
    proxies:
      - "@vpnfail_v2ray| AHS -🇺🇸|84.83"
      - "@v2rayvmess| AHS -🇺🇸|2.84"
      - "@v2ray1_ng| AHS -🇺🇸|85.44"
      - "@v2ray_confings2| AHS -🇺🇸|187.85"
  - name: FALLBACK
    type: fallback
    url: http://hi.bonds.id/ping
    interval: 300
    proxies:
      - "@vpnfail_v2ray| AHS -🇺🇸|84.83"
      - "@v2rayvmess| AHS -🇺🇸|2.84"
      - "@v2ray1_ng| AHS -🇺🇸|85.44"
      - "@v2ray_confings2| AHS -🇺🇸|187.85"
rules:
  - MATCH,MANUAL