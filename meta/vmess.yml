proxy-groups:
  - name: MANUAL
    type: select
    proxies:
      - "@vpnfail_v2ray| AHS -🚩|18.31"
      - "@vpnfail_v2ray| AHS -🇫🇷|119.84"
      - "@v2rayvmess| AHS -🇺🇸|18.57"
      - "@hope_net| AHS -🇺🇸|23.78"
      - LOAD-BALANCE
      - BEST-PING
      - FALLBACK
      - DIRECT
  - name: LOAD-BALANCE
    type: load-balance
    strategy: consistent-hashing
    url: http://hi.bonds.id/ping
    interval: 300
    proxies:
      - "@vpnfail_v2ray| AHS -🚩|18.31"
      - "@vpnfail_v2ray| AHS -🇫🇷|119.84"
      - "@v2rayvmess| AHS -🇺🇸|18.57"
      - "@hope_net| AHS -🇺🇸|23.78"
  - name: BEST-PING
    type: url-test
    url: http://hi.bonds.id/ping
    interval: 300
    tolerance: 50
    proxies:
      - "@vpnfail_v2ray| AHS -🚩|18.31"
      - "@vpnfail_v2ray| AHS -🇫🇷|119.84"
      - "@v2rayvmess| AHS -🇺🇸|18.57"
      - "@hope_net| AHS -🇺🇸|23.78"
  - name: FALLBACK
