port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: false
mode: rule
log-level: silent
allow-lan: true
external-controller: 0.0.0.0:9090
secret: ""
bind-address: "*"
unified-delay: true
profile:
  store-selected: true
dns:
  enable: true
  ipv6: false
  enhanced-mode: redir-host
  listen: 0.0.0.0:7874
  nameserver:
    - 8.8.8.8
    - 1.0.0.1
    - https://dns.google/dns-query
  fallback:
    - 1.1.1.1
    - 8.8.4.4
    - https://cloudflare-dns.com/dns-query
    - 112.215.203.254
  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
    - 112.215.203.254
proxies:
  - name: "@vpnfail_v2ray| AHS -🇮🇷|840.23"
    server: Snapp.ir
    port: 2095
    type: vmess
    uuid: bc06a3c8-7855-4b96-9d78-923e163519ca
    alterId: 0
    cipher: auto
    tls: false
    skip-cert-verify: true
    servername: gonet.wirobike.ir
    network: ws
    ws-opts:
      path: /
      headers:
        Host: gonet.wirobike.ir
    udp: true
  - name: "@vpnfail_v2ray| AHS -🇮🇷|600.23"
    server: snapp.ir
    port: 8080
    type: vmess
    uuid: de86130a-05e7-4e7e-8f9d-29efd834d726
    alterId: 0
    cipher: auto
    tls: false
    skip-cert-verify: true
    servername: free.fekroplus.ir
    network: ws
    ws-opts:
      path: /
      headers:
        Host: free.fekroplus.ir
    udp: true
  - name: "@v2rayvmess| AHS -🇺🇸|18.62"
    server: id-lb.vhax.net
    port: 80
    type: vmess
    uuid: 6fea1649-425b-4092-bf53-29792152c925
    alterId: 0
    cipher: auto
    tls: false
    skip-cert-verify: true
    servername: zoom.us
    network: ws
    ws-opts:
      path: /sshkit/Arsham85231/6347d08022b91/
      headers:
        Host: zoom.us
    udp: true
  - name: "@v2ray_confings2| AHS -🇺🇸|82.82"
    server: 188.114.96.1
    port: 443
    type: vmess
    uuid: f584de15-2034-4170-a723-f48c2bae5e0f
    alterId: 0
    cipher: auto
    tls: true
    skip-cert-verify: true
    servername: afrhms16v.bestxray.buzz
    network: ws
    ws-opts:
      path: /linkws
      headers:
        Host: afrhms16v.bestxray.buzz
    udp: true
proxy-groups:
  - name: MANUAL
    type: select
    proxies:
      - "@vpnfail_v2ray| AHS -🇮🇷|840.23"
      - "@vpnfail_v2ray| AHS -🇮🇷|600.23"
      - "@v2rayvmess| AHS -🇺🇸|18.62"
      - "@v2ray_confings2| AHS -🇺🇸|82.82"
      - LOAD-BALANCE
      - BEST-PING
      - FALLBACK
      - DIRECT
  - name: LOAD-BALANCE
    type: load-balance
    strategy: consistent-hashing
    url: http://hi.bonds.id/ping
    interval: 300
    proxies:
      - "@vpnfail_v2ray| AHS -🇮🇷|840.23"
      - "@vpnfail_v2ray| AHS -🇮🇷|600.23"
      - "@v2rayvmess| AHS -🇺🇸|18.62"
      - "@v2ray_confings2| AHS -🇺🇸|82.82"
  - name: BEST-PING
    type: url-test
    url: http://hi.bonds.id/ping
    interval: 300
    tolerance: 50
    proxies:
      - "@vpnfail_v2ray| AHS -🇮🇷|840.23"
      - "@vpnfail_v2ray| AHS -🇮🇷|600.23"
      - "@v2rayvmess| AHS -🇺🇸|18.62"
      - "@v2ray_confings2| AHS -🇺🇸|82.82"
  - name: FALLBACK
    type: fallback
    url: http://hi.bonds.id/ping
    interval: 300
    proxies:
      - "@vpnfail_v2ray| AHS -🇮🇷|840.23"
      - "@vpnfail_v2ray| AHS -🇮🇷|600.23"
      - "@v2rayvmess| AHS -🇺🇸|18.62"
      - "@v2ray_confings2| AHS -🇺🇸|82.82"
rules:
  - MATCH,MANUAL