proxy-groups:
  - name: MANUAL
    type: select
    proxies:
      - "@v2rayvmess| AHS -🇺🇸|2.73"
      - "@SafeNet_Server| AHS -🇧🇷|112.58"
      - "@hope_net| AHS -🇺🇸|21.03"
      - "@v2ray_confings2| AHS -🇺🇸|130.05"
      - LOAD-BALANCE
      - BEST-PING
      - FALLBACK
      - DIRECT
  - name: LOAD-BALANCE
    type: load-balance
    strategy: consistent-hashing
    url: http://hi.bonds.id/ping
    interval: 300
    proxies:
      - "@v2rayvmess| AHS -🇺🇸|2.73"
      - "@SafeNet_Server| AHS -🇧🇷|112.58"
      - "@hope_net| AHS -🇺🇸|21.03"
      - "@v2ray_confings2| AHS -🇺🇸|130.05"
  - name: BEST-PING
    type: url-test
    url: http://hi.bonds.id/ping
    interval: 300
    tolerance: 50
    proxies:
      - "@v2rayvmess| AHS -🇺🇸|2.73"
      - "@SafeNet_Server| AHS -🇧🇷|112.58"
      - "@hope_net| AHS -🇺🇸|21.03"
      - "@v2ray_confings2| AHS -🇺🇸|130.05"
  - name: FALLBACK
    type: fallback
    url: http://hi.bonds.id/ping
    interval: 300
    proxies:
      - "@v2rayvmess| AHS -🇺🇸|2.73"
      - "@SafeNet_Server| AHS -🇧🇷|112.58"
      - "@hope_net| AHS -🇺🇸|21.03"
      - "@v2ray_confings2| AHS -🇺🇸|130.05"
rules:
  - MATCH,MANUAL