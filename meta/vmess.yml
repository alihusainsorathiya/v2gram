proxy-groups:
  - name: MANUAL
    type: select
    proxies:
      - "@v2rayvmess| AHS -🇺🇸|9.41"
      - "@SafeNet_Server| AHS -🇨🇦|74.37"
      - "@v2ray_vpn_ir| AHS -🇧🇷|158.74"
      - "@v2ray_confings2| AHS -🇺🇸|25.14"
      - LOAD-BALANCE
      - BEST-PING
      - FALLBACK
      - DIRECT
  - name: LOAD-BALANCE
    type: load-balance
    strategy: consistent-hashing
    url: http://hi.bonds.id/ping
    interval: 300
    proxies:
      - "@v2rayvmess| AHS -🇺🇸|9.41"
      - "@SafeNet_Server| AHS -🇨🇦|74.37"
      - "@v2ray_vpn_ir| AHS -🇧🇷|158.74"
      - "@v2ray_confings2| AHS -🇺🇸|25.14"
  - name: BEST-PING
    type: url-test
    url: http://hi.bonds.id/ping
    interval: 300
    tolerance: 50
    proxies:
      - "@v2rayvmess| AHS -🇺🇸|9.41"
      - "@SafeNet_Server| AHS -🇨🇦|74.37"
      - "@v2ray_vpn_ir| AHS -🇧🇷|158.74"
      - "@v2ray_confings2| AHS -🇺🇸|25.14"
  - name: FALLBACK
    type: fallback
    url: http://hi.bonds.id/ping
    interval: 300
    proxies:
      - "@v2rayvmess| AHS -🇺🇸|9.41"
      - "@SafeNet_Server| AHS -🇨🇦|74.37"
      - "@v2ray_vpn_ir| AHS -🇧🇷|158.74"
      - "@v2ray_confings2| AHS -🇺🇸|25.14"
rules:
  - MATCH,MANUAL