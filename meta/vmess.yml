    - https://dns.google/dns-query
  fallback:
    - 1.1.1.1
    - 8.8.4.4
    - https://cloudflare-dns.com/dns-query
    - 112.215.203.254
  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
    - 112.215.203.254
proxies:
  - name: "@vpnfail_v2ray| AHS -🇺🇸|84.83"
    server: 31.77.149.131
    port: 110
    type: vmess
    uuid: 5ed7206a-cd8d-4b02-add1-4f7b787178c9
    alterId: 0
    cipher: auto
    tls: false
    skip-cert-verify: true
    servername: ""
    udp: true
  - name: "@v2rayvmess| AHS -🇺🇸|2.84"
    server: id-lb.vhax.net
    port: 80
    type: vmess
    uuid: 6fea1649-425b-4092-bf53-29792152c925
    alterId: 0
    cipher: auto
    tls: false
    skip-cert-verify: true
    servername: zoom.us
    network: ws
    ws-opts:
      path: /sshkit/Arsham85231/6347d08022b91/
