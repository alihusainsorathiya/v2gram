port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: false
mode: rule
log-level: silent
allow-lan: true
external-controller: 0.0.0.0:9090
secret: ""
bind-address: "*"
unified-delay: true
profile:
  store-selected: true
dns:
  enable: true
  ipv6: false
  enhanced-mode: redir-host
  listen: 0.0.0.0:7874
  nameserver:
    - 8.8.8.8
    - 1.0.0.1
    - https://dns.google/dns-query
  fallback:
    - 1.1.1.1
    - 8.8.4.4
    - https://cloudflare-dns.com/dns-query
    - 112.215.203.254
  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
    - 112.215.203.254
proxies:
  - name: "@oneclickvpnkeys| AHS -🇩🇪|122.32"
    server: 46.225.54.75
    port: 10410
    type: vmess
    uuid: 0654d64d-08bf-43e5-ad44-18a7d1a8d6f7
    alterId: 0
    cipher: auto
    tls: false
    skip-cert-verify: true
    servername: ""
    udp: true
  - name: "@oneclickvpnkeys| AHS -🇮🇹|119.37"
    server: 45.92.70.236
    port: 22324
    type: vmess
    uuid: 04621bae-ab36-11ec-b909-0242ac120002
    alterId: 0
    cipher: auto
    tls: false
    skip-cert-verify: true
    servername: ""
    udp: true
  - name: "@vpnfail_v2ray| AHS -🇧🇬|146.07"
    server: 45.39.241.51
    port: 38543
    type: vmess
    uuid: f54778cc-ce26-4f8d-923f-f8e62b090cde
    alterId: 0
    cipher: auto
    tls: false
    skip-cert-verify: true
    servername: ""
    udp: true
  - name: "@v2rayvmess| AHS -🇺🇸|14.9"
    server: id-lb.vhax.net
    port: 80
    type: vmess
    uuid: 6fea1649-425b-4092-bf53-29792152c925
    alterId: 0
    cipher: auto
    tls: false
    skip-cert-verify: true
    servername: zoom.us
    network: ws
    ws-opts:
      path: /sshkit/Arsham85231/6347d08022b91/
      headers:
        Host: zoom.us
    udp: true
proxy-groups:
  - name: MANUAL
    type: select
    proxies:
      - "@oneclickvpnkeys| AHS -🇩🇪|122.32"
      - "@oneclickvpnkeys| AHS -🇮🇹|119.37"
      - "@vpnfail_v2ray| AHS -🇧🇬|146.07"
      - "@v2rayvmess| AHS -🇺🇸|14.9"
      - LOAD-BALANCE
      - BEST-PING
      - FALLBACK
      - DIRECT
  - name: LOAD-BALANCE
    type: load-balance
    strategy: consistent-hashing
    url: http://hi.bonds.id/ping
    interval: 300
    proxies:
      - "@oneclickvpnkeys| AHS -🇩🇪|122.32"
      - "@oneclickvpnkeys| AHS -🇮🇹|119.37"
      - "@vpnfail_v2ray| AHS -🇧🇬|146.07"
      - "@v2rayvmess| AHS -🇺🇸|14.9"
  - name: BEST-PING
    type: url-test
    url: http://hi.bonds.id/ping
    interval: 300
    tolerance: 50
    proxies:
      - "@oneclickvpnkeys| AHS -🇩🇪|122.32"
      - "@oneclickvpnkeys| AHS -🇮🇹|119.37"
      - "@vpnfail_v2ray| AHS -🇧🇬|146.07"
      - "@v2rayvmess| AHS -🇺🇸|14.9"
  - name: FALLBACK
    type: fallback
    url: http://hi.bonds.id/ping
    interval: 300
    proxies:
      - "@oneclickvpnkeys| AHS -🇩🇪|122.32"
      - "@oneclickvpnkeys| AHS -🇮🇹|119.37"
      - "@vpnfail_v2ray| AHS -🇧🇬|146.07"
      - "@v2rayvmess| AHS -🇺🇸|14.9"
rules:
  - MATCH,MANUAL