    type: select
    proxies:
      - "@vpnfail_v2ray| AHS -🇲🇾|210.17"
      - "@vpnfail_v2ray| AHS -🇨🇦|18.28"
      - "@vpnfail_v2ray| AHS -🇳🇱|100.27"
