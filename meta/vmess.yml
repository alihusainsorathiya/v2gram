  - name: "@v2ray1_ng| AHS -🇺🇸|85.44"
    server: 31.77.149.131
    port: 110
    type: vmess
    uuid: 958f5940-de3d-4466-bb30-b605993db27e
    alterId: 0
    cipher: auto
    tls: false
    skip-cert-verify: true
    servername: ""
