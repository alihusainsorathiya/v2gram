    port: 80
    type: vmess
    uuid: 6fea1649-425b-4092-bf53-29792152c925
    alterId: 0
    cipher: auto
    tls: false
    skip-cert-verify: true
    servername: zoom.us
    network: ws
    ws-opts:
      path: /sshkit/Arsham85231/6347d08022b91/
      headers:
        Host: zoom.us
    udp: true
  - name: "@SafeNet_Server| AHS -🇧🇷|112.58"
    server: 172.233.17.76
    port: 22324
    type: vmess
    uuid: 04621bae-ab36-11ec-b909-0242ac120002
    alterId: 0
    cipher: auto
    tls: false
    skip-cert-verify: true
    servername: ""
    udp: true
