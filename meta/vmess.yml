port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: false
mode: rule
log-level: silent
allow-lan: true
external-controller: 0.0.0.0:9090
secret: ""
bind-address: "*"
unified-delay: true
profile:
  store-selected: true
dns:
  enable: true
  ipv6: false
  enhanced-mode: redir-host
  listen: 0.0.0.0:7874
  nameserver:
    - 8.8.8.8
    - 1.0.0.1
    - https://dns.google/dns-query
  fallback:
    - 1.1.1.1
    - 8.8.4.4
    - https://cloudflare-dns.com/dns-query
    - 112.215.203.254
  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
    - 112.215.203.254
proxies:
  - name: "@vpnfail_v2ray| AHS -🇱🇺|133.36"
    server: 107.189.7.176
    port: 53469
    type: vmess
    uuid: 2d7f32b9-5722-4d12-9325-6a4ef95c78df
    alterId: 0
    cipher: auto
    tls: true
    skip-cert-verify: true
    servername: ""
    network: ws
    ws-opts:
      path: /
      headers:
        Host: ""
    udp: true
  - name: "@vpnfail_v2ray| AHS -🇭🇰|187.12"
    server: 47.244.120.197
    port: 44867
    type: vmess
    uuid: 845e6b08-2919-4290-ade0-5dc7dcea59ca
    alterId: 0
    cipher: auto
    tls: false
    skip-cert-verify: true
    servername: ""
    network: ws
    ws-opts:
      path: /
      headers:
        Host: ""
    udp: true
  - name: "@v2rayvmess| AHS -🇺🇸|10.61"
    server: id-lb.vhax.net
    port: 80
    type: vmess
    uuid: 6fea1649-425b-4092-bf53-29792152c925
    alterId: 0
    cipher: auto
    tls: false
    skip-cert-verify: true
    servername: zoom.us
    network: ws
    ws-opts:
      path: /sshkit/Arsham85231/6347d08022b91/
      headers:
        Host: zoom.us
    udp: true
proxy-groups:
  - name: MANUAL
    type: select
    proxies:
      - "@vpnfail_v2ray| AHS -🇱🇺|133.36"
      - "@vpnfail_v2ray| AHS -🇭🇰|187.12"
      - "@v2rayvmess| AHS -🇺🇸|10.61"
      - LOAD-BALANCE
      - BEST-PING
      - FALLBACK
      - DIRECT
  - name: LOAD-BALANCE
    type: load-balance
    strategy: consistent-hashing
    url: http://hi.bonds.id/ping
    interval: 300
    proxies:
      - "@vpnfail_v2ray| AHS -🇱🇺|133.36"
      - "@vpnfail_v2ray| AHS -🇭🇰|187.12"
      - "@v2rayvmess| AHS -🇺🇸|10.61"
  - name: BEST-PING
    type: url-test
    url: http://hi.bonds.id/ping
    interval: 300
    tolerance: 50
    proxies:
      - "@vpnfail_v2ray| AHS -🇱🇺|133.36"
      - "@vpnfail_v2ray| AHS -🇭🇰|187.12"
      - "@v2rayvmess| AHS -🇺🇸|10.61"
  - name: FALLBACK
    type: fallback
    url: http://hi.bonds.id/ping
    interval: 300
    proxies:
      - "@vpnfail_v2ray| AHS -🇱🇺|133.36"
      - "@vpnfail_v2ray| AHS -🇭🇰|187.12"
      - "@v2rayvmess| AHS -🇺🇸|10.61"
rules:
  - MATCH,MANUAL