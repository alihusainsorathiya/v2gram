proxy-groups:
  - name: MANUAL
    type: select
    proxies:
      - "@oneclickvpnkeys| AHS -🇲🇩|112.65"
      - "@oneclickvpnkeys| AHS -🇺🇸|17.57"
      - "@vpnfail_v2ray| AHS -🇹🇷|149.43"
      - "@v2rayvmess| AHS -🇺🇸|14.75"
      - LOAD-BALANCE
      - BEST-PING
      - FALLBACK
      - DIRECT
  - name: LOAD-BALANCE
    type: load-balance
    strategy: consistent-hashing
    url: http://hi.bonds.id/ping
    interval: 300
    proxies:
      - "@oneclickvpnkeys| AHS -🇲🇩|112.65"
      - "@oneclickvpnkeys| AHS -🇺🇸|17.57"
      - "@vpnfail_v2ray| AHS -🇹🇷|149.43"
      - "@v2rayvmess| AHS -🇺🇸|14.75"
  - name: BEST-PING
    type: url-test
    url: http://hi.bonds.id/ping
    interval: 300
    tolerance: 50
    proxies:
      - "@oneclickvpnkeys| AHS -🇲🇩|112.65"
      - "@oneclickvpnkeys| AHS -🇺🇸|17.57"
      - "@vpnfail_v2ray| AHS -🇹🇷|149.43"
      - "@v2rayvmess| AHS -🇺🇸|14.75"
  - name: FALLBACK
    type: fallback
    url: http://hi.bonds.id/ping
    interval: 300
    proxies:
      - "@oneclickvpnkeys| AHS -🇲🇩|112.65"
      - "@oneclickvpnkeys| AHS -🇺🇸|17.57"
      - "@vpnfail_v2ray| AHS -🇹🇷|149.43"
      - "@v2rayvmess| AHS -🇺🇸|14.75"
rules:
  - MATCH,MANUAL