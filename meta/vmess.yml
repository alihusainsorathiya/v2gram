port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: false
mode: rule
log-level: silent
allow-lan: true
external-controller: 0.0.0.0:9090
secret: ""
bind-address: "*"
unified-delay: true
profile:
  store-selected: true
dns:
  enable: true
  ipv6: false
  enhanced-mode: redir-host
  listen: 0.0.0.0:7874
  nameserver:
    - 8.8.8.8
    - 1.0.0.1
    - https://dns.google/dns-query
  fallback:
    - 1.1.1.1
    - 8.8.4.4
    - https://cloudflare-dns.com/dns-query
    - 112.215.203.254
  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
    - 112.215.203.254
proxies:
  - name: "@prrofile_purple| AHS -🇮🇷|483.8"
    server: cdn.ip-static.com
    port: 80
    type: vmess
    uuid: a9311ff2-14bf-4ba6-8601-42028a7e3a84
    alterId: 0
    cipher: auto
    tls: false
    skip-cert-verify: true
    servername: FIN003.midasnet.work
    network: ws
    ws-opts:
      path: /
      headers:
        Host: FIN003.midasnet.work
    udp: true
  - name: "@v2rayvmess| AHS -🇺🇸|15.56"
    server: id-lb.vhax.net
    port: 80
    type: vmess
    uuid: 6fea1649-425b-4092-bf53-29792152c925
    alterId: 0
    cipher: auto
    tls: false
    skip-cert-verify: true
    servername: zoom.us
    network: ws
    ws-opts:
      path: /sshkit/Arsham85231/6347d08022b91/
      headers:
        Host: zoom.us
    udp: true
proxy-groups:
  - name: MANUAL
    type: select
    proxies:
      - "@prrofile_purple| AHS -🇮🇷|483.8"
      - "@v2rayvmess| AHS -🇺🇸|15.56"
      - LOAD-BALANCE
      - BEST-PING
      - FALLBACK
      - DIRECT
  - name: LOAD-BALANCE
    type: load-balance
    strategy: consistent-hashing
    url: http://hi.bonds.id/ping
    interval: 300
    proxies:
      - "@prrofile_purple| AHS -🇮🇷|483.8"
      - "@v2rayvmess| AHS -🇺🇸|15.56"
  - name: BEST-PING
    type: url-test
    url: http://hi.bonds.id/ping
    interval: 300
    tolerance: 50
    proxies:
      - "@prrofile_purple| AHS -🇮🇷|483.8"
      - "@v2rayvmess| AHS -🇺🇸|15.56"
  - name: FALLBACK
    type: fallback
    url: http://hi.bonds.id/ping
    interval: 300
    proxies:
      - "@prrofile_purple| AHS -🇮🇷|483.8"
      - "@v2rayvmess| AHS -🇺🇸|15.56"
rules:
  - MATCH,MANUAL